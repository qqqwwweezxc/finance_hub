services:
  db:
    image: postgres:16
    container_name: financehub_db
    restart: always
    environment:
      POSTGRES_DB: financehub
      POSTGRES_USER: vitosik
      POSTGRES_PASSWORD: 12312358
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vitosik -d financehub"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: financehub_web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: